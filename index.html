<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desmos Redesign | Scientific</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap');
        
        body { 
            background-color: #ffffff; 
            font-family: 'Inter', sans-serif;
            color: #3b3b3b;
        }

        /* Desmos-style Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 10px; }

        .math-field {
            font-family: 'Roboto Mono', monospace;
            min-height: 80px;
        }

        /* Button Styling */
        .btn-base {
            @apply transition-all duration-75 flex items-center justify-center rounded-lg text-[15px] font-medium;
            height: 48px;
            user-select: none;
        }

        .btn-num { @apply bg-white border border-gray-200 text-gray-800 hover:bg-gray-50 active:scale-95 shadow-sm; }
        .btn-func { @apply bg-gray-50 border border-gray-100 text-blue-600 hover:bg-blue-50 active:scale-95; }
        .btn-op { @apply bg-gray-100 border border-gray-200 text-gray-700 hover:bg-gray-200 font-bold active:scale-95; }
        .btn-action { @apply bg-blue-600 text-white hover:bg-blue-700 shadow-md active:scale-95; }
        .btn-danger { @apply bg-rose-50 text-rose-600 border border-rose-100 hover:bg-rose-100 active:scale-95; }

        .history-card {
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        .history-card:hover {
            border-left-color: #2563eb;
            background: #f8fafc;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [input, setInput] = useState("");
            const [result, setResult] = useState(null);
            const [history, setHistory] = useState([]);
            const [isRadian, setIsRadian] = useState(true);
            const [ans, setAns] = useState(0);
            const displayRef = useRef(null);
            const mathConfig = math.create(math.all);

            const calculate = () => {
                if (!input) return;
                try {
                    let query = input.replace(/×/g, '*').replace(/÷/g, '/');
                    const scope = { ans: ans };
                    
                    if (!isRadian) {
                        query = query.replace(/(sin|cos|tan)\(([^)]+)\)/g, '$1(($2) * pi / 180)');
                    }

                    const evalResult = mathConfig.evaluate(query, scope);
                    const formattedResult = mathConfig.format(evalResult, { precision: 10 });
                    
                    setHistory([{ exp: input, res: formattedResult, id: Date.now() }, ...history]);
                    setAns(formattedResult);
                    setResult(formattedResult);
                    setInput(""); 
                } catch (e) { setResult("Invalid Expression"); }
            };

            const handleAction = (val) => {
                if (val === "AC") { setInput(""); setResult(null); }
                else if (val === "DEL") { setInput(prev => prev.slice(0, -1)); }
                else if (val === "=") { calculate(); }
                else { setInput(prev => prev + val); }
            };

            useEffect(() => {
                if (displayRef.current) {
                    const mathString = input.replace(/\*/g, '\\cdot ').replace(/\//g, '\\div ').replace(/sqrt/g, '\\sqrt') || '\\text{ }';
                    katex.render(mathString, displayRef.current, { throwOnError: false, displayMode: true });
                }
            }, [input]);

            return (
                <div className="flex flex-col h-screen md:flex-row bg-white overflow-hidden">
                    
                    {/* Left Sidebar: History (Hidden on small mobile, scrollable) */}
                    <div className="hidden md:flex flex-col w-80 border-r border-gray-100 bg-[#fafafa]">
                        <div className="p-6 border-b border-gray-100 flex items-center justify-between">
                            <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest">History</h2>
                            <button onClick={() => setHistory([])} className="text-[10px] text-gray-400 hover:text-rose-500 uppercase font-bold">Clear</button>
                        </div>
                        <div className="flex-1 overflow-y-auto">
                            {history.length === 0 && (
                                <div className="p-10 text-center text-gray-300 text-sm italic">Expressions will appear here</div>
                            )}
                            {history.map(item => (
                                <div key={item.id} className="history-card p-6 border-b border-gray-50 cursor-pointer" onClick={() => setInput(item.exp)}>
                                    <div className="text-xs text-gray-400 font-mono mb-1">{item.exp}</div>
                                    <div className="text-lg text-gray-800 font-semibold">= {item.res}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Right Main: Calculator */}
                    <div className="flex-1 flex flex-col relative">
                        
                        {/* Header / Mode Toggle */}
                        <div className="h-16 px-6 flex items-center justify-between border-b border-gray-50">
                            <div className="flex space-x-1 bg-gray-100 p-1 rounded-lg">
                                <button onClick={() => setIsRadian(false)} className={`px-3 py-1 text-[11px] font-bold rounded-md transition ${!isRadian ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>DEG</button>
                                <button onClick={() => setIsRadian(true)} className={`px-3 py-1 text-[11px] font-bold rounded-md transition ${isRadian ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>RAD</button>
                            </div>
                            <div className="text-sm font-semibold text-gray-300">Desmos | Scientific</div>
                        </div>

                        {/* Display Area */}
                        <div className="flex-1 flex flex-col p-8 md:p-12">
                            <div className="flex-1 flex flex-col justify-center">
                                <div ref={displayRef} className="math-field text-4xl text-gray-800 transition-all duration-200"></div>
                                {result && !input && (
                                    <div className="mt-4 text-2xl text-blue-600 font-light opacity-80 animate-pulse">
                                        Result: <span className="font-semibold">{result}</span>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Keypad Wrapper */}
                        <div className="bg-[#f2f4f7] p-4 md:p-8 rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.03)]">
                            <div className="max-w-3xl mx-auto grid grid-cols-5 gap-3">
                                {/* Row 1: Scientific Functions */}
                                <button onClick={() => handleAction('sin(')} className="btn-base btn-func">sin</button>
                                <button onClick={() => handleAction('cos(')} className="btn-base btn-func">cos</button>
                                <button onClick={() => handleAction('tan(')} className="btn-base btn-func">tan</button>
                                <button onClick={() => handleAction('(')} className="btn-base btn-op">(</button>
                                <button onClick={() => handleAction(')')} className="btn-base btn-op">)</button>

                                {/* Row 2 */}
                                <button onClick={() => handleAction('sqrt(')} className="btn-base btn-func">√</button>
                                <button onClick={() => handleAction('^')} className="btn-base btn-func">xʸ</button>
                                <button onClick={() => handleAction('log(')} className="btn-base btn-func">log</button>
                                <button onClick={() => handleAction('ln(')} className="btn-base btn-func">ln</button>
                                <button onClick={() => handleAction('!')} className="btn-base btn-op">n!</button>

                                {/* Row 3: Nums & Basics */}
                                <button onClick={() => handleAction('7')} className="btn-base btn-num">7</button>
                                <button onClick={() => handleAction('8')} className="btn-base btn-num">8</button>
                                <button onClick={() => handleAction('9')} className="btn-base btn-num">9</button>
                                <button onClick={() => handleAction('÷')} className="btn-base btn-op text-xl">÷</button>
                                <button onClick={() => handleAction('DEL')} className="btn-base btn-danger text-xs font-bold uppercase">Back</button>

                                {/* Row 4 */}
                                <button onClick={() => handleAction('4')} className="btn-base btn-num">4</button>
                                <button onClick={() => handleAction('5')} className="btn-base btn-num">5</button>
                                <button onClick={() => handleAction('6')} className="btn-base btn-num">6</button>
                                <button onClick={() => handleAction('×')} className="btn-base btn-op text-xl">×</button>
                                <button onClick={() => handleAction('AC')} className="btn-base btn-danger text-xs font-bold uppercase">Clear</button>

                                {/* Row 5 */}
                                <button onClick={() => handleAction('1')} className="btn-base btn-num">1</button>
                                <button onClick={() => handleAction('2')} className="btn-base btn-num">2</button>
                                <button onClick={() => handleAction('3')} className="btn-base btn-num">3</button>
                                <button onClick={() => handleAction('-')} className="btn-base btn-op text-xl">−</button>
                                <button onClick={() => handleAction('ans')} className="btn-base btn-op text-xs font-bold uppercase tracking-tighter">Ans</button>

                                {/* Row 6 */}
                                <button onClick={() => handleAction('0')} className="btn-base btn-num">0</button>
                                <button onClick={() => handleAction('.')} className="btn-base btn-num">.</button>
                                <button onClick={() => handleAction('pi')} className="btn-base btn-num">π</button>
                                <button onClick={() => handleAction('+')} className="btn-base btn-op text-xl">+</button>
                                <button onClick={() => handleAction('=')} className="btn-base btn-action text-2xl">=</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
